services:
  - type: web
    name: expense-tracker
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: expense-tracker-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.12.0

databases:
  - name: expense-tracker-db
    databaseName: expenses
    user: expenses_user
    plan: free
