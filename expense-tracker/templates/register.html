<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — Expense Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      background: #f5f5f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 32px;
      width: 100%;
      max-width: 380px;
      border: 1px solid #ececec;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo-icon {
      width: 56px;
      height: 56px;
      background: #fff0eb;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin: 0 auto 12px;
    }

    .logo h1 { font-size: 20px; font-weight: 600; color: #222; }
    .logo p  { font-size: 12px; color: #aaa; margin-top: 4px; }

    .error {
      background: #fff0f0;
      border: 1px solid #ffd0d0;
      color: #c0392b;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 6px;
      font-weight: 500;
    }

    input {
      width: 100%;
      border: 1.5px solid #e8e8e8;
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 14px;
      font-family: 'Poppins', sans-serif;
      color: #333;
      outline: none;
      background: #fafafa;
      margin-bottom: 16px;
      transition: border-color .15s;
    }

    input:focus { border-color: #e05a2b; background: #fff; }

    .hint {
      font-size: 11px;
      color: #bbb;
      margin-top: -12px;
      margin-bottom: 16px;
    }

    button[type="submit"] {
      width: 100%;
      padding: 13px;
      background: #e05a2b;
      border: none;
      border-radius: 12px;
      color: white;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 4px;
      transition: background .15s;
    }

    button[type="submit"]:hover { background: #c94d22; }

    .footer {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: #aaa;
    }

    .footer a { color: #e05a2b; text-decoration: none; font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">💰</div>
      <h1>Create Account</h1>
      <p>Start tracking your expenses</p>
    </div>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <label>Username</label>
      <input type="text" name="username" placeholder="Choose a username" required autofocus />
      <label>Password</label>
      <input type="password" name="password" placeholder="Min. 6 characters" required />
      <p class="hint">Must be at least 6 characters</p>
      <button type="submit">Create Account</button>
    </form>

    <div class="footer">
      Already have an account? <a href="/login">Sign In</a>
    </div>
  </div>
</body>
</html>
