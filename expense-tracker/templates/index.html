<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── PROFILE ── */
    .profile-btn {
      position: relative;
      display: flex;
      align-items: center;
      gap: 8px;
      background: #fff0eb;
      border: none;
      border-radius: 20px;
      padding: 6px 12px 6px 6px;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      transition: background .15s;
    }
    .profile-btn:hover { background: #ffe0d0; }
    .profile-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #e05a2b;
      color: white;
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .profile-name {
      font-size: 12px;
      font-weight: 500;
      color: #e05a2b;
      max-width: 80px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── DROPDOWN ── */
    .profile-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      background: white;
      border: 1px solid #ececec;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.10);
      min-width: 160px;
      z-index: 100;
      overflow: hidden;
      display: none;
    }
    .profile-dropdown.open { display: block; }

    .dropdown-header {
      padding: 12px 16px;
      border-bottom: 1px solid #f0f0f0;
    }
    .dropdown-username {
      font-size: 13px;
      font-weight: 600;
      color: #222;
    }
    .dropdown-label {
      font-size: 11px;
      color: #aaa;
      margin-top: 2px;
    }
    .dropdown-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 16px;
      font-size: 13px;
      color: #555;
      text-decoration: none;
      cursor: pointer;
      transition: background .1s;
      border: none;
      background: none;
      width: 100%;
      font-family: 'Poppins', sans-serif;
    }
    .dropdown-item:hover { background: #f9f9f7; }
    .dropdown-item.logout { color: #e05a2b; }
  </style>
</head>
<body>
  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="month-nav">
        <button class="nav-arrow" id="prevMonth">&#8249;</button>
        <div class="month-info">
          <span class="month-label" id="monthLabel">this month</span>
          <span class="month-title" id="monthTitle">Month</span>
        </div>
        <button class="nav-arrow" id="nextMonth">&#8250;</button>
      </div>

      <!-- Profile -->
      <div style="position:relative">
        <button class="profile-btn" id="profileBtn">
          <div class="profile-avatar" id="profileAvatar">?</div>
          <span class="profile-name" id="profileName">User</span>
        </button>
        <div class="profile-dropdown" id="profileDropdown">
          <div class="dropdown-header">
            <div class="dropdown-username" id="dropdownUsername">Username</div>
            <div class="dropdown-label">Personal Account</div>
          </div>
          <a href="/logout" class="dropdown-item logout">
            🚪 Sign Out
          </a>
        </div>
      </div>
    </header>

    <!-- Tabs -->
    <nav class="tabs">
      <button class="tab active" data-tab="list">list</button>
      <button class="tab" data-tab="summary">summary</button>
    </nav>

    <!-- LIST VIEW -->
    <section class="view" id="view-list">
      <div class="filters" id="categoryFilters">
        <button class="filter-tag active" data-cat="all">all</button>
      </div>
      <div class="expense-list" id="expenseList">
        <div class="empty-state">
          <div class="empty-icon">₹</div>
          <div class="empty-text">loading…</div>
        </div>
      </div>
    </section>

    <!-- SUMMARY VIEW -->
    <section class="view hidden" id="view-summary">
      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-label">all time</div>
          <div class="stat-value" id="statAllTime">₹0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label" id="statMonthLabel">month</div>
          <div class="stat-value" id="statMonth">₹0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">transactions</div>
          <div class="stat-value" id="statCount">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">avg / tx</div>
          <div class="stat-value" id="statAvg">₹0</div>
        </div>
      </div>

      <div class="section-title">charts</div>
      <div class="charts-card">
        <div class="charts-row">
          <div class="chart-col">
            <svg id="catPie" width="148" height="148" viewBox="0 0 148 148"></svg>
            <div class="chart-label">by category</div>
            <div class="legend" id="catLegend"></div>
          </div>
          <div class="chart-divider"></div>
          <div class="chart-col">
            <svg id="weekPie" width="148" height="148" viewBox="0 0 148 148"></svg>
            <div class="chart-label">by week</div>
            <div class="legend" id="weekLegend"></div>
          </div>
        </div>
      </div>

      <div class="section-title">breakdown</div>
      <div class="bar-list" id="barList"></div>
    </section>

  </div>

  <!-- FAB -->
  <button class="fab" id="openForm">+</button>

  <!-- Modal -->
  <div class="overlay hidden" id="overlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <span class="modal-title">Add Expense</span>
        <button class="modal-close" id="closeForm">×</button>
      </div>
      <div class="input-wrap">
        <span class="rupee">₹</span>
        <input type="number" id="inputAmount" placeholder="0" autocomplete="off" />
      </div>
      <input type="text" id="inputNote" class="text-input" placeholder="What was it for?" />
      <div class="cat-grid" id="catGrid"></div>
      <input type="date" id="inputDate" class="text-input date-input" />
      <button class="submit-btn" id="submitBtn">Add Expense</button>
    </div>
  </div>

  <script>
    // Set username from Flask
    const USERNAME = "{{ username }}";
    document.getElementById("profileName").textContent     = USERNAME;
    document.getElementById("profileAvatar").textContent   = USERNAME.charAt(0).toUpperCase();
    document.getElementById("dropdownUsername").textContent = USERNAME;

    // Profile dropdown toggle
    const profileBtn      = document.getElementById("profileBtn");
    const profileDropdown = document.getElementById("profileDropdown");
    profileBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      profileDropdown.classList.toggle("open");
    });
    document.addEventListener("click", () => profileDropdown.classList.remove("open"));
  </script>

  <script src="/static/js/app.js"></script>
</body>
</html>
